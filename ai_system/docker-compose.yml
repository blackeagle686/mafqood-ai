services:
  # Redis - Message broker for Celery
  redis:
    image: redis:7-alpine
    container_name: mafqood_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass mafqood_redis_password --timeout 300 --tcp-keepalive 60
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mafqood_redis_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mafqood_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # FastAPI Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mafqood_api
    command: python3 manage.py runserver 0.0.0.0:8000
    environment:
      - REDIS_URL=redis://:mafqood_redis_password@redis:6379/0
      - CHROMA_DB_PATH=/app/chroma_db
      - CV_CTX_ID=-1  # Use -1 for CPU, 0 for GPU (requires nvidia-docker)
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./temp_uploads:/app/temp_uploads
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mafqood_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/people/report/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '1'
          memory: 2G

  # Celery Worker for background tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mafqood_worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 --time-limit=7200 --soft-time-limit=6900 -O fair --max-tasks-per-child=100 --without-gossip --without-heartbeat --without-mingle
    environment:
      - REDIS_URL=redis://:mafqood_redis_password@redis:6379/0
      - CHROMA_DB_PATH=/app/chroma_db
      - CV_CTX_ID=-1
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./temp_uploads:/app/temp_uploads
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mafqood_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # Celery Beat Scheduler (optional, for scheduled tasks)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mafqood_beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - REDIS_URL=redis://:mafqood_redis_password@redis:6379/0
      - CHROMA_DB_PATH=/app/chroma_db
      - CV_CTX_ID=-1
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mafqood_network

  # Flower - Celery monitoring tool (optional)
  flower:
    image: mher/flower
    container_name: mafqood_flower
    command: 
      - "celery"
      - "-A"
      - "app.celery_app"
      - "flower"
      - "--port=5555"
      - "--broker=redis://:mafqood_redis_password@redis:6379/0"
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://:mafqood_redis_password@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mafqood_network

# Named volumes for data persistence
volumes:
  redis_data:
    driver: local

# Network for service communication
networks:
  mafqood_network:
    driver: bridge
