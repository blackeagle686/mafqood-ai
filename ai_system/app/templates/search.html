<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث عن شخص - مفقود</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="scanline"></div>
    <nav>
        <div class="nav-content">
            <a href="/" class="logo">مفقود AI</a>
            <div class="nav-links">
                <a href="{% url 'report_page' %}">إرسال بلاغ</a>
                <a href="{% url 'search_page' %}" class="active">بحث الوجه</a>
                <a href="{% url 'video_search_page' %}">تحليل الفيديو</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <main>
            <div class="section-header">
                <h1 class="tech-font">تحليل البصمة الحيوية للوجه</h1>
                <p>قم برفع صورة الهدف للبدء في عملية المطابقة مع قاعدة البيانات المركزية.</p>
            </div>

            <div class="card" style="max-width: 800px; margin: 0 auto;">
                {% if errors %}
                <div
                    style="border: 1px solid var(--danger); color: var(--danger); padding: 1rem; margin-bottom: 2rem; font-family: 'Share Tech Mono';">
                    [ ! ] خطأ في التحليل: يرجى التأكد من جودة الصورة المرفوعة.
                </div>
                {% endif %}

                <form id="search-form" action="/api/search/face/" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="form-group">
                        <div class="upload-area" onclick="document.getElementById('file-input').click()">
                            <div class="upload-icon">🔍</div>
                            <p class="tech-font">READY_FOR_SCAN</p>
                            <input type="file" id="file-input" name="file" accept="image/*" style="display: none;"
                                onchange="previewImage(event)" required>
                            <img id="image-preview" src="#" alt="Preview"
                                style="max-width: 100%; border: 1px solid var(--primary);">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%;">
                        بدء عملية المطابقة الذكية
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function previewImage(event) {
            const preview = document.getElementById('image-preview');
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                preview.src = reader.result;
                preview.style.display = 'block';
            }
            if (file) reader.readAsDataURL(file);
        }
    </script>
</body>

</html>
